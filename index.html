<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#1a1200;}
body{font-family:Georgia,serif;color:#fff8e1;overflow-x:hidden;}
#app{min-height:100vh;background:linear-gradient(145deg,#1a1200 0%,#2e2000 40%,#1a0e00 100%);display:flex;flex-direction:column;}
nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid rgba(245,200,0,0.3);background:rgba(15,10,0,0.8);backdrop-filter:blur(14px);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{width:36px;height:36px;border-radius:8px;}
.logo-text{font-size:19px;font-weight:bold;letter-spacing:2px;color:#f5c800;text-shadow:0 0 18px rgba(245,200,0,0.5);}
.nav-btns{display:flex;gap:6px;flex-wrap:wrap;}
.nav-btn{padding:7px 12px;border-radius:20px;border:1px solid rgba(245,200,0,0.3);background:transparent;color:#fff8e1;cursor:pointer;font-size:12px;font-family:inherit;}
main{flex:1;display:flex;flex-direction:column;align-items:center;padding:28px 16px 40px;overflow-y:auto;}
.card{background:rgba(255,210,0,0.05);border:1px solid rgba(255,200,0,0.12);border-radius:22px;padding:28px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.title{font-size:22px;font-weight:bold;margin-bottom:6px;color:#f5c800;letter-spacing:1px;}
.subtitle{font-size:13px;color:rgba(255,248,225,0.5);margin-bottom:22px;}
input,textarea{width:100%;padding:13px 15px;border-radius:12px;border:1px solid rgba(245,200,0,0.3);background:rgba(255,200,0,0.07);color:#fff8e1;font-size:15px;margin-bottom:10px;outline:none;font-family:inherit;box-sizing:border-box;}
textarea{height:90px;resize:vertical;}
.btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#f5c800,#c98f00);color:#1a0e00;font-size:15px;font-weight:bold;cursor:pointer;letter-spacing:1px;margin-top:6px;box-shadow:0 4px 20px rgba(245,200,0,0.3);font-family:inherit;display:block;text-align:center;}
.btn-outline{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(245,200,0,0.3);background:transparent;color:#f5c800;font-size:14px;cursor:pointer;margin-top:10px;font-family:inherit;display:block;text-align:center;}
.menu-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;border-radius:14px;border:2px solid #f5c800;background:rgba(245,200,0,0.1);color:#f5c800;font-size:15px;font-weight:bold;cursor:pointer;letter-spacing:1px;margin-top:12px;font-family:inherit;text-decoration:none;}
.err{color:#ff6b6b;font-size:13px;margin-bottom:8px;}
.progress-bar{background:rgba(255,255,255,0.08);border-radius:20px;height:10px;overflow:hidden;margin-bottom:10px;}
.progress-fill{height:100%;background:linear-gradient(90deg,#f5c800,#c98f00);border-radius:20px;transition:width .6s ease;}
.stamps{display:flex;justify-content:space-around;margin-top:10px;}
.stamp{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;}
.stamp.done{background:linear-gradient(135deg,#f5c800,#c98f00);color:#1a0e00;}
.stamp.empty{background:rgba(255,255,255,0.08);border:1px solid rgba(245,200,0,0.3);}
.stat-box{background:rgba(245,200,0,0.1);border-radius:14px;padding:14px;text-align:center;border:1px solid rgba(245,200,0,0.3);}
.stat-val{font-size:26px;font-weight:bold;color:#f5c800;}
.stat-lbl{font-size:11px;color:rgba(255,248,225,0.5);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;}
.badge.on{background:rgba(245,200,0,0.12);border:1px solid #f5c800;color:#f5c800;}
.badge.off{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,248,225,0.4);}
.tab-bar{display:flex;border-bottom:1px solid rgba(245,200,0,0.3);background:rgba(0,0,0,0.3);}
.tab{flex:1;padding:11px 4px;border:none;background:transparent;color:rgba(255,248,225,0.5);border-bottom:2px solid transparent;cursor:pointer;font-size:11px;font-family:inherit;}
.tab.active{color:#f5c800;border-bottom-color:#f5c800;font-weight:bold;}
.admin-main{flex:1;overflow-y:auto;padding:20px 16px;max-width:800px;margin:0 auto;width:100%;}
.section-hdr{padding:14px 18px;border-bottom:1px solid rgba(245,200,0,0.2);font-size:14px;font-weight:bold;color:#f5c800;}
.list-row{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid rgba(245,200,0,0.08);font-size:13px;}
.list-row.alt{background:rgba(245,200,0,0.04);}
.chart-wrap{display:flex;align-items:flex-end;gap:4px;height:90px;padding:0 4px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;}
.bar-inner{flex:1;width:100%;display:flex;align-items:flex-end;}
.bar-fill{width:100%;background:linear-gradient(180deg,#f5c800,#f5c80088);border-radius:4px 4px 0 0;transition:height .5s;}
.bar-lbl{font-size:9px;color:rgba(255,248,225,0.5);white-space:nowrap;}
.checkin-success{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
.checkin-card{background:linear-gradient(145deg,#1a1200,#2e2000);border:2px solid #f5c800;border-radius:24px;padding:40px 30px;text-align:center;max-width:340px;width:100%;box-shadow:0 0 60px rgba(245,200,0,0.3);animation:popIn .3s ease;}
@keyframes popIn{from{transform:scale(0.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.checkin-card .big-icon{font-size:64px;margin-bottom:16px;}
.checkin-card h2{font-size:24px;color:#f5c800;margin-bottom:8px;}
.checkin-card p{font-size:15px;color:rgba(255,248,225,0.7);margin-bottom:6px;line-height:1.6;}
.save-login-wrap{display:flex;align-items:center;gap:10px;margin-top:12px;cursor:pointer;}
.save-login-wrap input{width:18px;height:18px;accent-color:#f5c800;margin:0;cursor:pointer;}
.save-login-wrap span{font-size:13px;color:rgba(255,248,225,0.6);}
.notif-list{background:rgba(255,210,0,0.05);border:1px solid rgba(255,200,0,0.12);border-radius:14px;overflow:hidden;margin-top:14px;}
.notif-item{padding:12px 16px;border-bottom:1px solid rgba(245,200,0,0.08);}
.qr-section{text-align:center;margin:16px 0;padding:16px;background:rgba(245,200,0,0.05);border-radius:14px;border:1px solid rgba(245,200,0,0.1);}
.qr-wrap{display:inline-block;padding:12px;background:#fff;border-radius:12px;box-shadow:0 0 20px rgba(245,200,0,0.2);}
.qr-wrap img,.qr-wrap canvas{display:block;}
.scan-result{margin-top:12px;padding:12px;border-radius:12px;text-align:center;font-size:13px;font-weight:bold;}
.scan-ok{background:rgba(100,220,100,0.1);border:1px solid #64dc64;color:#64dc64;}
.scan-fail{background:rgba(255,107,107,0.1);border:1px solid #ff6b6b;color:#ff6b6b;}
.scan-warn{background:rgba(255,165,0,0.1);border:1px solid orange;color:orange;}
video{width:100%;max-width:300px;border-radius:12px;margin-top:12px;display:block;margin-left:auto;margin-right:auto;}
</style>

async function saveCustomerDB(c){try{await setDoc(doc(db,"customers",c.id),c);}catch(e){console.error(e);}}
async function loadCustomersDB(){
  try{const snap=await getDocs(collection(db,"customers"));const r={};snap.forEach(d=>{r[d.id]=d.data();});return r;}catch(e){return {};}
}
async function loadNotifsDB(){
  try{const snap=await getDocs(collection(db,"notifications"));const r=[];snap.forEach(d=>r.push(d.data()));return r.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));}catch(e){return [];}
}
async function saveNotifDB(n){try{await setDoc(doc(db,"notifications",n.id),n);}catch(e){}}
function listenCustomers(cb){return onSnapshot(collection(db,"customers"),snap=>{const r={};snap.forEach(d=>{r[d.id]=d.data();});cb(r);});}

let customersCache={};
let notifsCache=[];
let unsubListener=null;
let qrScannerStream=null;
let qrScanInterval=null;

const todayMidnight=()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();};
const todayStr=()=>new Date().toLocaleDateString("tr-TR");

let state={
  page:"home",customers:{},currentId:null,
  adminUnlocked:false,adminTab:"stats",chartView:"daily",
  showLogin:false,notifications:[],
  loginError:"",formError:"",adminError:"",
  notifSent:false,regType:"phone",
  checkInPopup:null,loading:false,
  saveLogin:true,scannerActive:false,scanResult:null,scanResultType:"ok",
};

function setState(p){Object.assign(state,p);render();}
async function updateCustomer(c){customersCache[c.id]=c;state.customers={...customersCache};await saveCustomerDB(c);render();}

async function initApp(){
  customersCache=await loadCustomersDB();
  notifsCache=await loadNotifsDB();
  const savedId=localStorage.getItem("ot_current_id");
  if(savedId&&customersCache[savedId]){state.currentId=savedId;state.page="profile";}
  state.customers=customersCache;
  state.notifications=notifsCache;
  render();
}

// Gerçek QR kod oluştur
function makeQR(elementId, text, size=160){
  setTimeout(()=>{
    const el=document.getElementById(elementId);
    if(!el)return;
    el.innerHTML="";
    try{
      new QRCode(el,{
        text:text,
        width:size,
        height:size,
        colorDark:"#1a1200",
        colorLight:"#ffffff",
        correctLevel:QRCode.CorrectLevel.H
      });
    }catch(e){console.error("QR error:",e);}
  },100);
}

// QR Scanner
function startQRScanner(){
  setState({scannerActive:true,scanResult:null});
  setTimeout(async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
      qrScannerStream=stream;
      const video=document.getElementById("qr-video");
      if(video){video.srcObject=stream;}
      if("BarcodeDetector" in window){
        const detector=new BarcodeDetector({formats:["qr_code"]});
        qrScanInterval=setInterval(async()=>{
          try{
            const v=document.getElementById("qr-video");
            if(!v||v.readyState<2)return;
            const barcodes=await detector.detect(v);
            if(barcodes.length>0){
              stopQRScanner();
              processQRScan(barcodes[0].rawValue);
            }
          }catch(e){}
        },500);
      }else{
        setState({scannerActive:false,scanResult:"⚠️ Bu tarayıcı QR okuma desteklemiyor. Chrome Android kullanın.",scanResultType:"warn"});
      }
    }catch(e){
      setState({scannerActive:false,scanResult:"❌ Kamera erişimi reddedildi.",scanResultType:"fail"});
    }
  },200);
}

function stopQRScanner(){
  if(qrScannerStream){qrScannerStream.getTracks().forEach(t=>t.stop());qrScannerStream=null;}
  if(qrScanInterval){clearInterval(qrScanInterval);qrScanInterval=null;}
  setState({scannerActive:false});
}

async function processQRScan(value){
  if(!value.startsWith("OTSINASI:")){
    setState({scanResult:"❌ Geçersiz QR kodu.",scanResultType:"fail"});
    return;
  }
  const customerId=value.split("OTSINASI:")[1];
  const customer=state.customers[customerId];
  if(!customer){
    setState({scanResult:"❌ Müşteri bulunamadı.",scanResultType:"fail"});
    return;
  }
  if(customer.lastVisitTs&&customer.lastVisitTs>=todayMidnight()){
    setState({scanResult:`⚠️ ${customer.name} bugün zaten check-in yaptı.`,scanResultType:"warn"});
    return;
  }
  const nv=customer.visits+1;
  const earned=nv%VISITS_FOR_DISC===0;
  const updated={...customer,visits:nv,lastVisit:todayStr(),lastVisitTs:Date.now(),discountsEarned:earned?customer.discountsEarned+1:customer.discountsEarned};
  await updateCustomer(updated);
  const msg=earned?`🎉 ${customer.name} — %${DISCOUNT_PCT} indirim kazandı! (${nv}. ziyaret)`:`✅ ${customer.name} — Check-in yapıldı! (${nv}. ziyaret)`;
  setState({scanResult:msg,scanResultType:"ok"});
  setTimeout(()=>setState({scanResult:null}),6000);
}

function getStats(){
  const all=Object.values(state.customers),now=new Date();
  const day30=new Date(now-30*864e5);
  const active30=all.filter(c=>{if(!c.lastVisit)return false;const[d,m,y]=c.lastVisit.split(".").map(Number);return new Date(y,m-1,d)>=day30;}).length;
  const totalVisits=all.reduce((s,c)=>s+c.visits,0);
  const totalDiscounts=all.reduce((s,c)=>s+c.discountsEarned,0);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(now-(6-i)*864e5);return{label:d.toLocaleDateString("tr-TR",{weekday:"short"}),value:all.filter(c=>c.lastVisit===d.toLocaleDateString("tr-TR")).length};});
  return{total:all.length,active30,totalVisits,totalDiscounts,days};
}

const el=(tag,attrs={},html="")=>{const e=document.createElement(tag);Object.entries(attrs).forEach(([k,v])=>{if(k==="class")e.className=v;else if(k==="style")Object.assign(e.style,v);else e[k]=v;});if(html)e.innerHTML=html;return e;};

function renderChart(data){
  const max=Math.max(...data.map(d=>d.value),1);
  const wrap=el("div",{class:"chart-wrap"});
  data.forEach(d=>{const col=el("div",{class:"bar-col"});const inner=el("div",{class:"bar-inner"});const fill=el("div",{class:"bar-fill"});fill.style.height=d.value>0?`${(d.value/max)*100}%`:"0px";inner.appendChild(fill);col.appendChild(inner);col.appendChild(el("div",{class:"bar-lbl"},d.label));wrap.appendChild(col);});
  return wrap;
}

async function doRegister(){
  const name=document.getElementById("reg-name")?.value.trim();
  const contactVal=document.getElementById("reg-contact")?.value.trim();
  const birthday=document.getElementById("reg-birthday")?.value.trim();
  if(!name||!contactVal){setState({formError:"Lütfen ad ve telefon girin."});return;}
  if(birthday&&!/^\d{2}\/\d{2}$/.test(birthday)){setState({formError:"Doğum tarihi GG/AA formatında olmalı (örn: 15/03)."});return;}
  const key=contactVal.replace(/\s/g,"");
  if(state.customers[key]){setState({formError:"Bu numara zaten kayıtlı."});return;}
  const c={id:key,name,contact:key,contactType:"phone",visits:0,discountsEarned:0,joinDate:todayStr(),lastVisit:null,lastVisitTs:null,birthday:birthday||null};
  setState({loading:true});
  await updateCustomer(c);
  if(state.saveLogin)localStorage.setItem("ot_current_id",key);
  setState({currentId:key,page:"profile",formError:"",loading:false});
}

async function doLogin(){
  const val=document.getElementById("login-contact")?.value.replace(/\s/g,"");
  const save=document.getElementById("save-login-check")?.checked;
  setState({loading:true});
  customersCache=await loadCustomersDB();
  state.customers=customersCache;
  if(!state.customers[val]){setState({loginError:"Bu numara kayıtlı değil.",loading:false});return;}
  if(save)localStorage.setItem("ot_current_id",val);
  else localStorage.removeItem("ot_current_id");
  setState({currentId:val,page:"profile",showLogin:false,loginError:"",loading:false});
}

function doAdminLogin(){
  const pass=document.getElementById("admin-pass")?.value;
  if(pass===ADMIN_PASSWORD){
    if(unsubListener)unsubListener();
    unsubListener=listenCustomers(customers=>{state.customers=customers;customersCache=customers;render();});
    setState({adminUnlocked:true,adminError:""});
  }else setState({adminError:"Yanlış şifre."});
}

async function doSendNotif(){
  const title=document.getElementById("notif-title")?.value.trim();
  const body=document.getElementById("notif-body")?.value.trim();
  if(!title||!body)return;
  const notif={id:Date.now().toString(),title,body,date:todayStr(),time:new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}),timestamp:Date.now()};
  await saveNotifDB(notif);
  notifsCache=[notif,...notifsCache];
  state.notifications=notifsCache;
  if(document.getElementById("notif-title"))document.getElementById("notif-title").value="";
  if(document.getElementById("notif-body"))document.getElementById("notif-body").value="";
  setState({notifSent:true});
  setTimeout(()=>setState({notifSent:false}),3000);
}

function makeMenuBtn(){const a=el("a",{class:"menu-btn",href:MENU_URL},"🍽 Menüyü Gör");a.onclick=e=>{e.preventDefault();window.open(MENU_URL,"_blank");};return a;}

function makeNav(title,buttons=[]){
  const nav=el("nav");
  const logoDiv=el("div",{class:"logo"});
  const logoImg=el("img",{src:LOGO_B64,alt:"OT"});
  const logoText=el("span",{class:"logo-text"},title||"OT Şinasi");
  logoDiv.appendChild(logoImg);logoDiv.appendChild(logoText);nav.appendChild(logoDiv);
  const btns=el("div",{class:"nav-btns"});
  buttons.forEach(b=>{const btn=el("button",{class:"nav-btn"},b.label);btn.onclick=b.action;btns.appendChild(btn);});
  nav.appendChild(btns);
  return nav;
}

function renderCheckInPopup(app){
  const p=state.checkInPopup;
  if(!p)return;
  const overlay=el("div",{class:"checkin-success"});
  const card=el("div",{class:"checkin-card"});
  const icon=p.type==="discount"?"🎁":"✅";
  card.innerHTML=`<div class="big-icon">${icon}</div><h2>Hoş Geldiniz!</h2><p style="font-size:18px;color:#f5c800;font-weight:bold;margin-bottom:12px">${p.name}</p><p>${p.msg}</p><p style="margin-top:12px;font-size:13px;color:rgba(255,248,225,0.5)">Toplam ziyaret: <strong style="color:#f5c800">${p.visits}</strong></p>`;
  const closeBtn=el("button",{class:"btn",style:{marginTop:"20px"}},p.type==="discount"?"🎉 Harika!":"Tamam");
  closeBtn.onclick=()=>setState({checkInPopup:null});
  card.appendChild(closeBtn);overlay.appendChild(card);app.appendChild(overlay);
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(state.page==="home")renderHome(app);
  else if(state.page==="register")renderRegister(app);
  else if(state.page==="profile")renderProfile(app);
  else if(state.page==="admin")state.adminUnlocked?renderAdmin(app):renderAdminLogin(app);
  if(state.checkInPopup)renderCheckInPopup(app);
}

function renderHome(app){
  app.appendChild(makeNav("OT Şinasi",[{label:"Yönetici",action:()=>setState({page:"admin"})}]));

  const hero=el("div",{style:{textAlign:"center",marginBottom:"28px"}});

  main.appendChild(hero);
  const mwrap=el("div",{style:{width:"100%",maxWidth:"460px",marginBottom:"14px"}});
  mwrap.appendChild(makeMenuBtn());main.appendChild(mwrap);

  b1.onclick=()=>setState({page:"register"});main.appendChild(b1);
  const loginWrap=el("div",{style:{textAlign:"center",marginTop:"12px"}});
  const loginLink=el("button",{style:{background:"none",border:"none",color:"rgba(255,248,225,0.5)",fontSize:"13px",cursor:"pointer",textDecoration:"underline",fontFamily:"inherit"}},"Zaten üye misin? Giriş yap");
  loginLink.onclick=()=>setState({showLogin:true});loginWrap.appendChild(loginLink);main.appendChild(loginWrap);
  if(state.showLogin){
    const card=el("div",{class:"card",style:{marginTop:"22px"}});
    card.innerHTML=`<div class="title">Giriş Yap</div><div class="subtitle">Telefon numaranızla giriş yapın</div>`;
    const inp=el("input",{type:"tel",placeholder:"Telefon numarası (05XX...)",id:"login-contact"});
    inp.onkeydown=e=>{if(e.key==="Enter")doLogin();};card.appendChild(inp);
    if(state.loginError)card.appendChild(el("div",{class:"err"},state.loginError));
    if(state.loading)card.appendChild(el("div",{style:{textAlign:"center",color:"#f5c800",padding:"10px"}},"Yükleniyor..."));
    const saveWrap=el("div",{class:"save-login-wrap"});
    const saveCheck=el("input",{type:"checkbox",id:"save-login-check"});saveCheck.checked=true;
    saveWrap.appendChild(saveCheck);saveWrap.appendChild(el("span",{},"Beni hatırla"));
    card.appendChild(saveWrap);
    const lb=el("button",{class:"btn"},"Giriş Yap");lb.onclick=doLogin;
    const cb=el("button",{class:"btn-outline"},"İptal");cb.onclick=()=>setState({showLogin:false,loginError:""});
    card.appendChild(lb);card.appendChild(cb);main.appendChild(card);
  }
  app.appendChild(main);
}

function renderRegister(app){
  app.appendChild(makeNav("OT Şinasi",[{label:"← Geri",action:()=>setState({page:"home"})}]));
  const main=el("main");
  const card=el("div",{class:"card"});
  card.innerHTML=`<div class="title">Üye Ol</div><div class="subtitle">Sadakat programına katılın, hediyeler kazanın</div>`;
  const ni=el("input",{type:"text",placeholder:"Ad Soyad",id:"reg-name"});
  const ci=el("input",{type:"tel",placeholder:"Telefon numarası (05XX...)",id:"reg-contact"});
  const bi=el("input",{type:"text",placeholder:"Doğum tarihi GG/AA (isteğe bağlı)",id:"reg-birthday",maxLength:5});
  bi.oninput=e=>{let v=e.target.value.replace(/[^0-9]/g,"");if(v.length>=3)v=v.substring(0,2)+"/"+v.substring(2);e.target.value=v;};
  card.appendChild(ni);card.appendChild(ci);card.appendChild(bi);
  const saveWrap=el("div",{class:"save-login-wrap"});
  const saveCheck=el("input",{type:"checkbox",id:"save-reg-check"});saveCheck.checked=true;
  saveCheck.onchange=e=>setState({saveLogin:e.target.checked});
  saveWrap.appendChild(saveCheck);saveWrap.appendChild(el("span",{},"Beni hatırla (otomatik giriş)"));
  card.appendChild(saveWrap);
  if(state.formError)card.appendChild(el("div",{class:"err"},state.formError));
  if(state.loading)card.appendChild(el("div",{style:{textAlign:"center",color:"#f5c800",padding:"10px"}},"Kaydediliyor..."));
  const rb=el("button",{class:"btn"},"Kayıt Ol & Puan Kazanmaya Başla");rb.onclick=doRegister;
  const cb=el("button",{class:"btn-outline"},"İptal");cb.onclick=()=>setState({page:"home"});
  card.appendChild(rb);card.appendChild(cb);main.appendChild(card);app.appendChild(main);
}

function renderProfile(app){
  const c=state.customers[state.currentId];
  if(!c){setState({page:"home"});return;}
  app.appendChild(makeNav("OT Şinasi",[{label:"Çıkış",action:()=>{localStorage.removeItem("ot_current_id");setState({page:"home",currentId:null});}}]));
  const main=el("main");
  const card=el("div",{class:"card"});
  const visited=c.visits%VISITS_FOR_DISC;
  const pct=(visited/VISITS_FOR_DISC*100).toFixed(0);
  const alreadyCheckedIn=c.lastVisitTs&&c.lastVisitTs>=todayMidnight();
  card.innerHTML=`<div style="text-align:center;margin-bottom:20px"><img src="${LOGO_B64}" style="width:60px;height:60px;border-radius:12px;margin-bottom:8px"/><div style="font-size:20px;font-weight:bold;color:#f5c800">${c.name}</div><div style="font-size:12px;color:rgba(255,248,225,0.5);margin-top:4px">Üye — ${c.joinDate}${c.birthday?" · 🎂 "+c.birthday:""}</div></div><div style="margin-bottom:20px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px"><span>İndirime kalan</span><span style="color:#f5c800">${visited} / ${VISITS_FOR_DISC}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="stamps">${Array.from({length:VISITS_FOR_DISC},(_,i)=>`<div class="stamp ${i<visited?"done":"empty"}">${i<visited?"✓":""}</div>`).join("")}</div></div><div class="grid2"><div class="stat-box"><div style="font-size:20px">📅</div><div class="stat-val">${c.visits}</div><div class="stat-lbl">Toplam Ziyaret</div></div><div class="stat-box"><div style="font-size:20px">🎁</div><div class="stat-val">${c.discountsEarned}</div><div class="stat-lbl">Kazanılan İndirim</div></div></div>`;
  
  // Müşteri QR kodu
  const qrSec=el("div",{class:"qr-section"});
  qrSec.innerHTML=`<div style="font-size:13px;color:rgba(255,248,225,0.5);margin-bottom:8px">📲 Check-in QR Kodunuz</div><div style="font-size:11px;color:rgba(255,248,225,0.3);margin-bottom:10px">Garsonunuza gösterin</div>`;
  const qrWrap=el("div",{class:"qr-wrap"});
  const qrDiv=el("div",{id:`qr-${c.id}`});
  qrWrap.appendChild(qrDiv);qrSec.appendChild(qrWrap);
  if(alreadyCheckedIn){
    const doneDiv=el("div",{style:{marginTop:"10px",fontSize:"13px",color:"#64dc64",fontWeight:"bold"}});
    doneDiv.innerHTML="✅ Bugün check-in yapıldı";
    qrSec.appendChild(doneDiv);
  }
  card.appendChild(qrSec);
  // QR'ı oluştur
  makeQR(`qr-${c.id}`,`OTSINASI:${c.id}`,160);
  
  card.appendChild(makeMenuBtn());
  if(state.notifications.length>0){
    const nl=el("div",{class:"notif-list"});
    nl.innerHTML=`<div class="section-hdr">🔔 Son Duyuru</div>`;
    state.notifications.slice(0,1).forEach(n=>{nl.innerHTML+=`<div class="notif-item"><div style="font-weight:bold;font-size:13px;margin-bottom:3px">${n.title}</div><div style="font-size:12px;color:rgba(255,248,225,0.5)">${n.body}</div></div>`;});
    card.appendChild(nl);
  }
  if(visited===0&&c.discountsEarned>0){
    const d=el("div",{style:{marginTop:"14px",padding:"13px",borderRadius:"12px",textAlign:"center",fontSize:"14px",fontWeight:"bold",background:"rgba(245,200,0,0.12)",border:"1px solid #f5c800",color:"#f5c800"}});
    d.innerHTML=`🎉 Tebrikler! %${DISCOUNT_PCT} indirim hakkınız var!`;card.appendChild(d);
  }
  main.appendChild(card);app.appendChild(main);
}

function renderAdminLogin(app){
  app.appendChild(makeNav("OT Şinasi",[{label:"← Geri",action:()=>setState({page:"home"})}]));
  const main=el("main");
  const card=el("div",{class:"card"});
  card.innerHTML=`<div style="text-align:center;font-size:40px;margin-bottom:6px">🔐</div><div class="title">Yönetici Paneli</div><div class="subtitle">Şifre ile giriş yapın</div>`;
  const inp=el("input",{type:"password",placeholder:"Şifre",id:"admin-pass"});
  inp.onkeydown=e=>{if(e.key==="Enter")doAdminLogin();};card.appendChild(inp);
  if(state.adminError)card.appendChild(el("div",{class:"err"},state.adminError));
  const lb=el("button",{class:"btn"},"Giriş Yap");lb.onclick=doAdminLogin;
  card.appendChild(lb);main.appendChild(card);app.appendChild(main);

function renderAdmin(app){
  const s=getStats();
  const all=Object.values(state.customers);
  app.appendChild(makeNav("Yönetici",[{label:"← Çıkış",action:()=>{if(unsubListener)unsubListener();stopQRScanner();setState({page:"home",adminUnlocked:false});}}]));
  const tabBar=el("div",{class:"tab-bar"});
  [["stats","📊 İstatistik"],["customers","👥 Müşteriler"],["notifications","🔔 Bildirim"],["scanner","📷 Check-in"]].forEach(([tab,label])=>{
    const t=el("button",{class:`tab${state.adminTab===tab?" active":""}`},label);
    t.onclick=()=>{if(state.adminTab==="scanner"&&tab!=="scanner")stopQRScanner();setState({adminTab:tab});};tabBar.appendChild(t);
  });
  app.appendChild(tabBar);
  const main=el("div",{class:"admin-main"});

  if(state.adminTab==="stats"){
    const kpi=el("div",{class:"grid2"});
    [{label:"Toplam Üye",val:s.total,icon:"👥",color:"#f5c800"},{label:"Aktif (30 gün)",val:s.active30,icon:"🟢",color:"#64dc64"},{label:"Toplam Ziyaret",val:s.totalVisits,icon:"📅",color:"#f5c800"},{label:"Verilen İndirim",val:s.totalDiscounts,icon:"🎁",color:"#f5a623"}].forEach(item=>{
      kpi.innerHTML+=`<div class="stat-box"><div style="font-size:22px">${item.icon}</div><div class="stat-val" style="color:${item.color}">${item.val}</div><div class="stat-lbl">${item.label}</div></div>`;
    });
    main.appendChild(kpi);
    const chartCard=el("div",{class:"card",style:{marginBottom:"16px"}});
    chartCard.innerHTML=`<div style="font-size:14px;font-weight:bold;color:#f5c800;margin-bottom:14px">Günlük Ziyaretler (7 gün)</div>`;
    chartCard.appendChild(renderChart(s.days));
    main.appendChild(chartCard);
  }

  if(state.adminTab==="customers"){
    const cCard=el("div",{class:"card",style:{padding:"0",overflow:"hidden"}});
    cCard.innerHTML=`<div class="section-hdr">Tüm Müşteriler (${all.length}) <span style="font-size:11px;color:#64dc64">● Canlı</span></div>`;
    if(all.length===0)cCard.innerHTML+=`<div style="padding:40px;text-align:center;color:rgba(255,248,225,0.5)">Henüz kayıtlı müşteri yok</div>`;
    else all.sort((a,b)=>b.visits-a.visits).forEach((c,i)=>{
      const isDisc=c.visits%VISITS_FOR_DISC===0&&c.visits>0;
      const [d,m,y]=(c.lastVisit||"").split(".").map(Number);
      const days=c.lastVisit?Math.floor((Date.now()-new Date(y,m-1,d))/864e5):null;
      const row=el("div",{class:`list-row${i%2===1?" alt":""}`});
      row.innerHTML=`<div><div style="font-weight:bold;margin-bottom:2px">${c.name}${c.birthday?" 🎂":""}</div><div style="font-size:11px;color:rgba(255,248,225,0.5)">${c.contact}${c.birthday?" · "+c.birthday:""}${days!=null?" · "+days+" gün önce":" · Ziyaret yok"}</div></div><div style="text-align:center"><div style="color:#f5c800;font-weight:bold;font-size:15px">${c.visits}</div><div style="font-size:10px;color:rgba(255,248,225,0.5)">ziyaret</div></div><div style="text-align:center"><div style="color:#64dc64;font-weight:bold;font-size:15px">${c.discountsEarned}</div><div style="font-size:10px;color:rgba(255,248,225,0.5)">indirim</div></div><div><span class="badge ${isDisc?"on":"off"}">${isDisc?"🎁 İndirim":`${c.visits%VISITS_FOR_DISC}/${VISITS_FOR_DISC}`}</span></div>`;
      cCard.appendChild(row);
    });
    main.appendChild(cCard);
  }

  if(state.adminTab==="notifications"){
    const nCard=el("div",{class:"card",style:{marginBottom:"16px"}});
    nCard.innerHTML=`<div class="title" style="font-size:16px">🔔 Bildirim Gönder</div><div class="subtitle">Uygulama içi duyuru gönderin</div>`;
    const ti=el("input",{type:"text",placeholder:"Başlık",id:"notif-title"});
    const bi=el("textarea",{placeholder:"Mesaj içeriği...",id:"notif-body"});
    const sb=el("button",{class:"btn"},state.notifSent?"✅ Gönderildi!":"📤 Gönder");sb.onclick=doSendNotif;
    nCard.appendChild(ti);nCard.appendChild(bi);nCard.appendChild(sb);main.appendChild(nCard);
    const hCard=el("div",{class:"card",style:{padding:"0",overflow:"hidden"}});
    hCard.innerHTML=`<div class="section-hdr">Gönderilen Bildirimler (${state.notifications.length})</div>`;
    if(state.notifications.length===0)hCard.innerHTML+=`<div style="padding:40px;text-align:center;color:rgba(255,248,225,0.5);font-size:13px">Henüz bildirim gönderilmedi</div>`;
    else state.notifications.forEach(n=>{hCard.innerHTML+=`<div class="notif-item"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><div style="font-weight:bold;font-size:13px">${n.title}</div><div style="font-size:10px;color:rgba(255,248,225,0.3)">${n.date} ${n.time}</div></div><div style="font-size:12px;color:rgba(255,248,225,0.5)">${n.body}</div></div>`;});
    main.appendChild(hCard);
  }

  if(state.adminTab==="scanner"){
    const scanCard=el("div",{class:"card",style:{textAlign:"center"}});
    scanCard.innerHTML=`<div style="font-size:16px;font-weight:bold;color:#f5c800;margin-bottom:8px">📷 QR ile Check-in</div><div style="font-size:13px;color:rgba(255,248,225,0.5);margin-bottom:16px">Müşterinin QR kodunu okutun — otomatik check-in yapılır</div>`;
    if(!state.scannerActive){
      const scanBtn=el("button",{class:"btn",style:{maxWidth:"240px",margin:"0 auto"}});
      scanBtn.innerHTML="📸 Kamerayı Aç";scanBtn.onclick=startQRScanner;
      scanCard.appendChild(scanBtn);
    }else{
      const video=el("video",{id:"qr-video",autoplay:true,playsinline:true});
      scanCard.appendChild(video);
      const cancelBtn=el("button",{class:"btn-outline",style:{marginTop:"12px"}});
      cancelBtn.innerHTML="✖ İptal";cancelBtn.onclick=stopQRScanner;
      scanCard.appendChild(cancelBtn);
    }
    if(state.scanResult){
      const resDiv=el("div",{class:`scan-result scan-${state.scanResultType}`});
      resDiv.innerHTML=state.scanResult;scanCard.appendChild(resDiv);
    }
    main.appendChild(scanCard);
  }

  app.appendChild(main);
}

initApp();
</script>
